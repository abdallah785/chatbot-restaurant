<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>QR Code Restaurant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
      *{margin:0;padding:0;box-sizing:border-box}
      body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a0a;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center}
      .container{text-align:center;padding:40px 20px;max-width:500px;width:100%}
      .card{background:#111;border-radius:24px;padding:40px 30px;box-shadow:0 20px 60px rgba(0,0,0,0.5)}
      .logo{font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:20px;letter-spacing:2px}
      h1{font-size:24px;font-weight:600;margin-bottom:6px}
      .subtitle{font-size:14px;color:rgba(255,255,255,0.5);margin-bottom:30px}
      #qrcode{display:inline-block;padding:20px;background:#fff;border-radius:16px;margin-bottom:24px}
      #qrcode canvas{display:block}
      .scan-text{font-size:15px;margin-bottom:30px;color:rgba(255,255,255,0.7)}
      .buttons{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
      .btn{padding:14px 28px;border-radius:14px;border:none;font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s}
      .btn-primary{background:var(--primary,#FF6B00);color:#fff}
      .btn-primary:hover{opacity:0.85;transform:scale(1.02)}
      .btn-secondary{background:rgba(255,255,255,0.08);color:#fff;border:1px solid rgba(255,255,255,0.15)}
      .btn-secondary:hover{background:rgba(255,255,255,0.12)}
      .footer{margin-top:30px;font-size:11px;color:rgba(255,255,255,0.25)}
      .loading{color:rgba(255,255,255,0.5);padding:40px}
      .error{color:#ff6b6b;padding:40px}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card" id="card">
        <div class="loading" id="loading">Chargement...</div>
      </div>
    </div>
    <script>
      function safeParseJSON(text){
        try{return JSON.parse(text);}catch(e){
          var cleaned=text.replace(/[\x00-\x1f\x7f]/g,function(c){
            if(c==='\t')return'\\t';if(c==='\n')return'\\n';if(c==='\r')return'\\r';return'';
          });
          return JSON.parse(cleaned);
        }
      }
      var WEBHOOK_URL='https://hook.eu1.make.com/4loqm3jex6phgi9g2grs7udk7dkibylm';
      var params=new URLSearchParams(window.location.search);
      var restoId=params.get('resto')||'';
      if(!restoId){
        document.getElementById('loading').innerHTML='<div class="error">Restaurant introuvable. Verifiez le lien.</div>';
      }else{
        fetch(WEBHOOK_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({resto_id:restoId,message:'__init__',history:[],conversation_id:'qr_'+Date.now()})})
        .then(function(r){return r.text()}).then(function(raw){
          var data=safeParseJSON(raw);
          if(data.resto){
            var r=data.resto;
            var primary=r.couleur_principale||'#FF6B00';
            document.documentElement.style.setProperty('--primary',primary);
            var chatUrl='https://chat.iabot.live/chat/?resto='+restoId;
            document.getElementById('card').innerHTML='<div class="logo">IABOT</div><h1>'+(r.nom||'Restaurant')+'</h1><p class="subtitle">QR Code personnalise</p><div id="qrcode"></div><p class="scan-text">Scannez pour parler a notre assistant IA</p><div class="buttons"><button class="btn btn-primary" onclick="downloadPNG()">Telecharger PNG</button><button class="btn btn-secondary" onclick="window.print()">Imprimer</button></div><div class="footer">Propulse par IAbot</div>';
            new QRCode(document.getElementById('qrcode'),{text:chatUrl,width:256,height:256,colorDark:primary,colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
            window.downloadPNG=function(){
              var canvas=document.querySelector('#qrcode canvas');
              if(!canvas)return;
              var link=document.createElement('a');
              link.download='qr-'+restoId+'.png';
              link.href=canvas.toDataURL('image/png');
              link.click();
            };
          }else{
            document.getElementById('loading').innerHTML='<div class="error">Restaurant introuvable.</div>';
          }
        })['catch'](function(){
          document.getElementById('loading').innerHTML='<div class="error">Erreur de chargement.</div>';
        });
      }
    </script>
  </body>
</html>
